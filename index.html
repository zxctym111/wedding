<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeff & Jessica's Wedding - 雅悅會館</title>
    <!-- 字體引入 -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --morandi-warm: #d4a373;
            --morandi-green: #8da399;
            --morandi-bg: #fefae0;
            --glass-bg: rgba(255, 255, 255, 0.75);
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--morandi-bg);
            color: #333;
            scroll-behavior: smooth;
        }

        .serif-en {
            font-family: 'Cormorant Garamond', serif;
        }

        /* 導覽列毛玻璃效果 */
        .glass-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 163, 115, 0.1);
            z-index: 1000;
        }

        /* 封面全螢幕 */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), 
                        url('https://i.postimg.cc/5ts0w3dC/she-ying-shi-da-zui-0008.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        /* 計時器卡片設計 */
        .timer-card {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            border-radius: 16px;
            padding: 1.25rem;
            min-width: 85px;
        }
        
        .timer-divider {
            width: 1px;
            height: 45px;
            background-color: var(--morandi-warm);
            margin: 0 0.75rem;
            opacity: 0.4;
        }

        /* 表單設計 */
        .btn-primary {
            background-color: var(--morandi-warm);
            color: white;
            transition: all 0.4s;
            letter-spacing: 2px;
        }

        .btn-primary:hover {
            background-color: #bc8a5f;
            box-shadow: 0 5px 15px rgba(212, 163, 115, 0.3);
        }

        input, select, textarea {
            border: 1px solid #e5e7eb;
            padding: 0.85rem;
            border-radius: 6px;
            width: 100%;
            margin-top: 0.4rem;
            font-size: 0.95rem;
        }

        label {
            font-weight: 500;
            color: #4b5563;
            display: block;
            margin-top: 1.25rem;
        }

        .label-en {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: var(--morandi-warm);
            text-transform: uppercase;
            font-weight: 600;
            margin-left: 4px;
        }

        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full glass-nav px-8 py-5 flex justify-between items-center">
        <div class="serif-en text-2xl font-bold text-[#d4a373]">Jeff & Jessica</div>
        <div class="hidden md:flex space-x-10 text-xs tracking-[0.2em] font-medium text-gray-600">
            <a href="#rsvp" class="hover:text-[#d4a373]">出席回函 RSVP</a>
        </div>
    </nav>

    <section class="hero">
        <div class="px-6">
            <h2 class="serif-en italic text-2xl md:text-3xl mb-4 tracking-widest opacity-90">Jeff & Jessica</h2>
            <h1 class="text-4xl md:text-6xl font-bold mb-8 leading-tight tracking-wider">Two Souls, One Journey.</h1>
            <p class="serif-en text-xl tracking-[0.3em] font-light">2026 / 10 / 10</p>
        </div>
    </section>

    <!-- 計時器 -->
    <section class="py-20 bg-white">
        <div class="container mx-auto px-4 text-center">
            <div id="countdown" class="flex flex-wrap justify-center items-center gap-4">
                <div class="timer-card"><span id="days" class="serif-en text-4xl block text-[#d4a373]">00</span><span class="text-[10px] text-gray-400">DAYS</span></div>
                <div class="timer-divider"></div>
                <div class="timer-card"><span id="hours" class="serif-en text-4xl block text-[#d4a373]">00</span><span class="text-[10px] text-gray-400">HOURS</span></div>
                <div class="timer-divider"></div>
                <div class="timer-card"><span id="minutes" class="serif-en text-4xl block text-[#d4a373]">00</span><span class="text-[10px] text-gray-400">MINS</span></div>
                <div class="timer-divider"></div>
                <div class="timer-card"><span id="seconds" class="serif-en text-4xl block text-[#d4a373]">00</span><span class="text-[10px] text-gray-400">SECS</span></div>
            </div>
        </div>
    </section>

    <!-- 回函表單 -->
    <section id="rsvp" class="py-24 bg-white">
        <div class="container mx-auto px-6 max-w-2xl">
            <div class="text-center mb-16">
                <span class="serif-en text-[#d4a373] tracking-[0.4em] text-sm uppercase">Wedding RSVP</span>
                <h2 class="text-4xl font-bold mt-4 mb-4 tracking-widest">出席回函</h2>
                <div class="w-10 h-[2px] bg-[#8da399] mx-auto mb-4"></div>
            </div>

            <!-- 隱藏式 Iframe 提交技術 -->
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>
            
            <form action="https://docs.google.com/forms/d/e/1FAIpQLSekiP1_8JVdJ27haukSFBpCIhb-Qm4iSRfXiR1NWzOOAQBARg/formResponse?" method="post" target="hidden_iframe" onsubmit="submitted=true;">
                
                <!-- 您的姓名 (entry.927207703) -->
                <div>
                    <label>您的姓名 <span class="label-en">NAME</span></label>
                    <input type="text" name="entry.927207703" required placeholder="請輸入姓名">
                </div>

                <!-- 電子郵件 (entry.1828609452) -->
                <div>
                    <label>電子郵件 <span class="label-en">EMAIL</span></label>
                    <input type="email" name="entry.1828609452" required placeholder="example@mail.com">
                </div>

                <!-- 與新人的關係 (entry.133531335) -->
                <div>
                    <label>與新人的關係 <span class="label-en">RELATIONSHIP</span></label>
                    <select name="entry.133531335" required>
                        <option value="" disabled selected>請選擇關係</option>
                        <option value="男方-Jeff建富的親友">男方-Jeff建富的親友</option>
                        <option value="女方-Jessica婕芸的親友">女方-Jessica婕芸的親友</option>
                        <option value="內湖高工的同事">內湖高工的同事</option>
                    </select>
                </div>

                <!-- 出席意願 (entry.1037440218) -->
                <div>
                    <label>出席意願 <span class="label-en">ATTENDANCE</span></label>
                    <select id="attendanceChoice" name="entry.1037440218" required onchange="toggleLogic()">
                        <option value="" disabled selected>請選擇意願</option>
                        <option value="會！一定會參加！環保愛地球，請寄電子喜帖給我">會！一定會參加！環保愛地球，請寄電子喜帖給我</option>
                        <option value="會！一定會參加！想留紀念，請寄紙本喜帖給我">會！一定會參加！想留紀念，請寄紙本喜帖給我</option>
                        <option value="不克參加，但我祝福滿滿">不克參加，但我祝福滿滿</option>
                    </select>
                </div>

                <!-- 智慧顯示：僅當選擇參加時顯示 -->
                <div id="logicFields" style="display: none;" class="fade-in">
                    <!-- 參加晚宴人數 (entry.1365883754) -->
                    <div>
                        <label>參加晚宴人數 <span class="label-en">NUMBER OF GUESTS</span></label>
                        <input type="number" id="guestCount" name="entry.1365883754" min="0" max="10" placeholder="請輸入出席人數" oninput="toggleDetails()">
                    </div>

                    <!-- 人數大於 0 才顯示細節 -->
                    <div id="guestDetails" style="display: none;" class="bg-[#fefae0]/50 p-6 mt-6 rounded-lg border border-[#d4a373]/20">
                        <div>
                            <!-- 素食需求 (entry.332745958) -->
                            <label class="mt-0">素食需求 (幾份) 若無請填「無」 <span class="label-en">VEGETARIAN</span></label>
                            <input type="text" name="entry.332745958" placeholder="例如：1 / 無">
                        </div>
                        <div>
                            <!-- 兒童椅需求數量 (entry.1505679686) -->
                            <label>兒童椅需求數量 (幾張) 若無請填「0」 <span class="label-en">BABY CHAIR</span></label>
                            <input type="number" name="entry.1505679686" min="0" max="10" placeholder="請輸入數量">
                        </div>
                    </div>
                </div>

                <!-- 地址 (entry.796650550) -->
                <div class="mt-4">
                    <label>寄送地址 (若選電子喜帖可免填) <span class="label-en">ADDRESS</span></label>
                    <input type="text" name="entry.796650550" placeholder="收件地址">
                </div>

                <!-- 對新人的話 (entry.570998358) -->
                <div class="mt-4">
                    <label>對新人的話 <span class="label-en">MESSAGE</span></label>
                    <textarea name="entry.570998358" rows="4" placeholder="祝福語..."></textarea>
                </div>

                <button type="submit" class="w-full mt-12 py-5 btn-primary rounded-lg text-lg font-bold">提交回函 SEND RSVP</button>
            </form>

            <div id="successMsg" style="display:none;" class="mt-12 text-center p-12 border border-[#d4a373] bg-white shadow-xl fade-in">
                <h3 class="text-2xl font-bold text-[#d4a373] mb-4">提交成功！</h3>
                <p class="text-gray-500">期待在婚禮當天見到您！</p>
                <button onclick="location.reload()" class="mt-8 text-sm text-[#8da399] underline">重新填寫</button>
            </div>
        </div>
    </section>

    <footer class="py-16 text-center text-gray-400 text-[10px] tracking-[0.3em] uppercase">
        © 2026 Jeff & Jessica Wedding.
    </footer>

    <script>
        let submitted = false;
        const weddingDate = new Date("Oct 10, 2026 17:30:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const d = weddingDate - now;
            document.getElementById("days").innerText = Math.floor(d / 86400000).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((d % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((d % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((d % 60000) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        function toggleLogic() {
            const val = document.getElementById('attendanceChoice').value;
            // 只要選項包含「會！」，就顯示人數填寫區塊
            document.getElementById('logicFields').style.display = val.includes("會！") ? 'block' : 'none';
        }

        function toggleDetails() {
            const count = document.getElementById('guestCount').value;
            // 人數大於 0 時展開細節 (素食與兒童椅)
            document.getElementById('guestDetails').style.display = (count > 0) ? 'block' : 'none';
        }

        function showSuccess() {
            // 提交後隱藏表單並顯示成功訊息
            document.querySelector('form').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('rsvp').scrollIntoView({behavior: 'smooth'});
        }
    </script>
</body>
</html>
